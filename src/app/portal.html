<div class="min-h-screen font-sans antialiased relative overflow-x-clip transition-all duration-700 ease-in-out animate-fade-in"
     [class.bg-[#080808]]="isCinematicGlow()"
     [class.text-white]="isCinematicGlow()"
     [class.bg-zinc-50]="!isCinematicGlow()"
     [class.text-zinc-900]="!isCinematicGlow()"
     [class.dark-theme]="isCinematicGlow()"
     [class.light-theme]="!isCinematicGlow()">

  <app-navbar 
    [isCinematicGlow]="isCinematicGlow()"
    [isScrolled]="isScrolled()"
    [wishlistCount]="wishlistCount()"
    [cartCount]="cartCount()"
    (openMenu)="isMenuOpen.set(true)"
    (openCart)="isCartOpen.set(true)"
    (openWishlist)="isWishlistOpen.set(true)"
    (navigate)="setView($event)">
  </app-navbar>


  <!-- ================= DYNAMIC VIEWS ROUTER ================= -->
  <router-outlet></router-outlet>

  <!-- ================= MASTER FOOTER NAVIGATION PLATFORM ================= -->
  @defer (on viewport) {
    <app-footer (navigate)="setView($event)"></app-footer>
  } @placeholder {
    <div style="min-height: 500px"></div>
  }
  <!-- ================= OVERLAY CAROUSEL SHOPPING CART DRAWER ================= -->
  @defer (when isCartOpen()) {
    @if (isCartOpen()) {
      <app-cart-drawer 
        (closeDrawer)="isCartOpen.set(false)"
        (openCheckout)="openCheckout()">
      </app-cart-drawer>
    }
  }

  <!-- ================= OVERLAY WISHLIST DRAWER ================= -->
  @defer (when isWishlistOpen()) {
    @if (isWishlistOpen()) {
      <app-wishlist-drawer 
        (closeDrawer)="isWishlistOpen.set(false)"
        (navigateDetail)="setView('detalle', $event); isWishlistOpen.set(false)">
      </app-wishlist-drawer>
    }
  }

  <!-- ================= AWWWARDS FULLSCREEN NAVIGATION MENU ================= -->
  @defer (when isMenuOpen()) {
    @if (isMenuOpen()) {
      <app-fullscreen-menu 
        [isCinematicGlow]="isCinematicGlow()"
        [currentView]="currentView()"
        [activeAdminTab]="activeAdminTab()"
        [cartCount]="cartCount()"
        (closeMenu)="isMenuOpen.set(false)"
        (navigate)="setView($event.view, $event.tab)">
      </app-fullscreen-menu>
    }
  }

  <!-- Cookie Consent Banner (Dark Mode Premium) -->
  @defer (when showCookieConsent()) {
    @if (showCookieConsent()) {
      <app-cookie-banner
        (configure)="showCookieConsent.set(false)"
        (reject)="rejectCookies()"
        (accept)="acceptCookies()">
      </app-cookie-banner>
    }
  }

</div>
